<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>데이터베이스 연결 테스트</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h1>🔥 Firebase 연결 확인</h1>
        <p id="status" style="font-size: 1.2em; color: gray;">설정값을 입력해주세요...</p>
    </div>

    <script>
        // ★ 아래 부분에 Firebase 콘솔에서 찾은 6가지 값을 복사해서 넣으세요 ★
        const firebaseConfig = {
            apiKey: "AIzaSyBaxcYn-PwBDTVoD4knE2awpwSrt0PscnE",
            authDomain: "daily-report-5a26e.firebaseapp.com",
            projectId: "daily-report-5a26e",
            storageBucket: "daily-report-5a26e.firebasestorage.app",
            messagingSenderId: "205436388270",
            appId: "1:205436388270:web:90c7816c5d88fd2991be3f"
        };

        // 초기화
        try {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            if (db) {
                document.getElementById('status').innerText = "✅ 데이터베이스에 성공적으로 연결되었습니다!";
                document.getElementById('status').style.color = "green";
            }
        } catch (error) {
            document.getElementById('status').innerText = "❌ 연결 실패: 설정값을 확인하세요.";
            document.getElementById('status').style.color = "red";
            console.error(error);
        }
    </script>
</body>
</html>
