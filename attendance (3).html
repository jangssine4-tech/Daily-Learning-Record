<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>출석 체크 | 잉글리시아이위드멘토링</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:#0b1120;color:#f0f4ff;min-height:100vh;overflow:hidden;overscroll-behavior:none}

.screen{display:none;position:fixed;inset:0;flex-direction:column}
.screen.active{display:flex}

/* ─── MAIN ─── */
#screen-main{background:linear-gradient(155deg,#0b1120 0%,#0f2040 60%,#0b1120 100%);padding:28px 28px 20px}
.main-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px}
.academy-name{font-size:13px;font-weight:700;color:#3b82f6;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px}
.main-title{font-size:30px;font-weight:900;color:#fff;line-height:1.1}
.main-title span{color:#60a5fa}
.clock-block{text-align:right}
.clock{font-size:42px;font-weight:900;color:#fff;font-variant-numeric:tabular-nums;line-height:1}
.clock-date{font-size:13px;color:#64748b;margin-top:4px}

.classes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.classes-label{font-size:13px;font-weight:600;color:#475569;letter-spacing:0.1em;text-transform:uppercase}
.refresh-btn{background:none;border:none;color:#334155;cursor:pointer;font-size:18px;transition:transform 0.3s}
.refresh-btn:hover{color:#64748b;transform:rotate(90deg)}

.classes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;overflow-y:auto;flex:1;padding-bottom:20px}
.classes-grid::-webkit-scrollbar{width:4px}
.classes-grid::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}

.class-card{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.06);border-radius:20px;padding:22px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.class-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.2s;background:rgba(255,255,255,0.04)}
.class-card:hover::before{opacity:1}
.class-card:active{transform:scale(0.97)}
.class-card.now{border-color:rgba(34,197,94,0.5);background:rgba(34,197,94,0.07)}
.class-card.soon{border-color:rgba(245,158,11,0.5);background:rgba(245,158,11,0.06)}
.class-card.past{opacity:0.45}

.class-status{font-size:11px;font-weight:700;letter-spacing:0.08em;padding:3px 10px;border-radius:20px;display:inline-block;margin-bottom:14px}
.status-now{background:rgba(34,197,94,0.2);color:#4ade80;border:1px solid rgba(34,197,94,0.3)}
.status-soon{background:rgba(245,158,11,0.2);color:#fbbf24;border:1px solid rgba(245,158,11,0.3)}
.status-upcoming{background:rgba(255,255,255,0.06);color:#475569;border:1px solid rgba(255,255,255,0.08)}
.status-past{background:rgba(255,255,255,0.03);color:#374151;border:1px solid rgba(255,255,255,0.05)}

.class-card-name{font-size:21px;font-weight:800;color:#fff;margin-bottom:6px}
.class-card-time{font-size:15px;color:#60a5fa;font-weight:600;margin-bottom:6px}
.class-card-teacher{font-size:13px;color:#475569}
.class-card-count{position:absolute;right:20px;top:20px;font-size:28px;font-weight:900;color:rgba(255,255,255,0.07);line-height:1}
.class-card-progress{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:0 0 20px 20px;transition:width 0.3s}

.no-class-msg{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:#1e293b;text-align:center}
.no-class-msg .icon{font-size:56px;margin-bottom:16px}
.no-class-msg p{font-size:17px;color:#334155}

.fab-admin{position:fixed;bottom:24px;right:24px;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#334155;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.fab-admin:hover{background:rgba(255,255,255,0.09);color:#64748b}

/* ─── CHECKIN ─── */
#screen-checkin{background:#090e1a}
.ci-header{background:linear-gradient(135deg,#1a3a7c,#1d4ed8);padding:18px 22px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.back-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.12);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s}
.back-btn:hover{background:rgba(255,255,255,0.2)}
.ci-header-info{flex:1;min-width:0}
.ci-header-info h2{font-size:20px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-header-info p{font-size:13px;color:rgba(255,255,255,0.6);margin-top:2px}
.qr-btn{background:rgba(255,255,255,0.12);border:none;color:#fff;padding:10px 16px;border-radius:12px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:background 0.2s;flex-shrink:0}
.qr-btn:hover{background:rgba(255,255,255,0.2)}

.ci-stats{display:flex;background:#0f1829;border-bottom:1px solid #1a2540;flex-shrink:0}
.stat{flex:1;padding:14px 8px;text-align:center}
.stat-n{font-size:30px;font-weight:900;line-height:1}
.stat-n.blue{color:#60a5fa}
.stat-n.green{color:#4ade80}
.stat-n.red{color:#f87171}
.stat-l{font-size:11px;color:#475569;font-weight:600;margin-top:3px}

.students-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:16px;overflow-y:auto;flex:1}
.students-grid::-webkit-scrollbar{width:4px}
.students-grid::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}

.student-card{background:#0f1829;border:2px solid transparent;border-radius:16px;padding:18px 12px;cursor:pointer;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all 0.15s;min-height:90px;justify-content:center}
.student-card:active{transform:scale(0.94)}
.student-card.present{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.5)}

.s-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;transition:background 0.2s}
.student-card.present .s-avatar{background:linear-gradient(135deg,#16a34a,#22c55e)}

.s-name{font-size:15px;font-weight:700;color:#e2e8f0}
.s-time{font-size:11px;color:#4ade80;font-weight:600}
.s-absent{font-size:11px;color:#334155}

/* ─── QR ─── */
#screen-qr{background:#000;position:relative}
#qr-video{width:100%;height:100%;object-fit:cover}
#qr-canvas{display:none}
.qr-ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.qr-finder{width:240px;height:240px;position:relative}
.qr-finder::before,.qr-finder::after{content:'';position:absolute;width:36px;height:36px;border:4px solid #60a5fa;border-style:solid}
.qr-finder::before{top:0;left:0;border-right:none;border-bottom:none;border-radius:6px 0 0 0}
.qr-finder::after{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 6px 0}
.qr-finder-br{position:absolute;bottom:0;left:0;width:36px;height:36px;border:4px solid #60a5fa;border-right:none;border-top:none;border-radius:0 0 0 6px}
.qr-finder-tr{position:absolute;top:0;right:0;width:36px;height:36px;border:4px solid #60a5fa;border-left:none;border-bottom:none;border-radius:0 6px 0 0}
.qr-shadow{position:absolute;inset:0;box-shadow:inset 0 0 0 9999px rgba(0,0,0,0.65)}
.qr-label{color:#fff;font-size:15px;font-weight:600;margin-top:20px;text-shadow:0 2px 8px rgba(0,0,0,0.9)}
.qr-back{position:absolute;top:20px;left:20px;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);border:none;color:#fff;padding:10px 18px;border-radius:20px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
.qr-scan-line{width:220px;height:2px;background:linear-gradient(90deg,transparent,#60a5fa,transparent);position:absolute;animation:scanline 2s ease-in-out infinite}
@keyframes scanline{0%,100%{top:20px}50%{top:calc(100% - 20px)}}

/* ─── SUCCESS ─── */
#screen-success{background:#090e1a;align-items:center;justify-content:center;text-align:center}
.success-circle{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(34,197,94,0.25),transparent);border:3px solid rgba(34,197,94,0.4);display:flex;align-items:center;justify-content:center;font-size:64px;margin-bottom:24px;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-student{font-size:44px;font-weight:900;color:#4ade80;margin-bottom:8px}
.success-text{font-size:22px;color:#64748b;font-weight:600}
.success-method{font-size:13px;color:#334155;margin-top:10px}
.success-bar{position:absolute;bottom:0;left:0;height:4px;background:#22c55e;animation:bar 2s linear forwards}
@keyframes bar{from{width:100%}to{width:0%}}

/* ─── ADMIN ─── */
#screen-admin{background:#090e1a}
.admin-top{background:#0f1829;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a2540;flex-shrink:0}
.admin-top h2{font-size:18px;font-weight:800}
.admin-tabs{display:flex;background:#090e1a;border-bottom:1px solid #1a2540;flex-shrink:0}
.a-tab{flex:1;padding:13px;background:none;border:none;color:#334155;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;letter-spacing:0.04em}
.a-tab.active{color:#60a5fa;border-bottom-color:#60a5fa}
.admin-body{flex:1;overflow-y:auto;padding:20px}
.admin-body::-webkit-scrollbar{width:4px}
.admin-body::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}

/* ─── SHARED COMPONENTS ─── */
.btn{padding:11px 22px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;transition:all 0.15s}
.btn-blue{background:#2563eb;color:#fff}
.btn-blue:hover{background:#1d4ed8}
.btn-red{background:#dc2626;color:#fff}
.btn-red:hover{background:#b91c1c}
.btn-ghost{background:rgba(255,255,255,0.05);color:#64748b}
.btn-ghost:hover{background:rgba(255,255,255,0.09)}

.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-label{font-size:11px;font-weight:800;color:#334155;letter-spacing:0.12em;text-transform:uppercase}

.cls-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.cls-item{background:#0f1829;border:1px solid #1a2540;border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.cls-item-info h3{font-size:16px;font-weight:700;margin-bottom:4px}
.cls-item-info p{font-size:12px;color:#475569}
.cls-actions{display:flex;gap:8px;flex-shrink:0}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn 0.2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#0f1829;border:1px solid #1a2540;border-radius:22px;padding:26px;width:min(92vw,480px);max-height:88vh;overflow-y:auto}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.modal h3{font-size:18px;font-weight:800;margin-bottom:20px}

.fg{margin-bottom:14px}
.fl{font-size:12px;color:#475569;font-weight:700;margin-bottom:6px;display:block;letter-spacing:0.06em;text-transform:uppercase}
.fi{width:100%;padding:11px 14px;background:#090e1a;border:1px solid #1a2540;border-radius:10px;color:#f0f4ff;font-size:14px;font-family:inherit;outline:none;transition:border-color 0.2s}
.fi:focus{border-color:#2563eb}
.fi option{background:#0f1829}

.day-row{display:flex;gap:8px;flex-wrap:wrap}
.day-btn{width:42px;height:42px;border-radius:50%;border:2px solid #1a2540;background:none;color:#475569;cursor:pointer;font-weight:800;font-family:inherit;font-size:14px;transition:all 0.15s}
.day-btn.on{background:#2563eb;border-color:#2563eb;color:#fff}

.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:8px}
.tag{display:inline-flex;align-items:center;gap:5px;background:#1a2540;border-radius:8px;padding:5px 10px;font-size:13px;color:#94a3b8}
.tag button{background:none;border:none;color:#64748b;cursor:pointer;font-size:15px;line-height:1;padding:0;transition:color 0.15s}
.tag button:hover{color:#ef4444}

.s-input-row{display:flex;gap:8px}

.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

/* PIN */
.pin-modal{background:#0f1829;border:1px solid #1a2540;border-radius:22px;padding:36px 28px;width:min(92vw,340px);text-align:center}
.pin-modal h3{font-size:22px;font-weight:800;margin-bottom:6px}
.pin-modal p{font-size:13px;color:#475569;margin-bottom:22px}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:22px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#1a2540;transition:all 0.15s}
.pin-dot.on{background:#3b82f6;box-shadow:0 0 10px rgba(59,130,246,0.6)}
.pin-dot.err{background:#ef4444;box-shadow:0 0 10px rgba(239,68,68,0.6)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.np{padding:16px;background:#1a2540;border:none;color:#fff;font-size:22px;font-weight:800;border-radius:14px;cursor:pointer;font-family:inherit;transition:background 0.1s}
.np:active{background:#243255}
.np.del{background:#0f1829;font-size:16px;color:#64748b}
.np.blank{background:transparent;pointer-events:none}

/* QR print cards */
.qr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.qr-card-p{background:#fff;border-radius:14px;padding:18px;text-align:center;color:#0b1120}
.qr-card-p .qr-name{font-size:15px;font-weight:700;margin-top:10px;color:#1e293b}
.qr-card-p .qr-cls{font-size:11px;color:#64748b;margin-top:3px}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;border:1px solid #334155;color:#f0f4ff;padding:11px 22px;border-radius:22px;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ATTENDANCE TABLE */
.att-table{width:100%;border-collapse:collapse;font-size:13px}
.att-table th{background:#0b1120;padding:10px 12px;text-align:left;color:#334155;font-weight:700;font-size:11px;letter-spacing:0.08em;text-transform:uppercase}
.att-table td{padding:11px 12px;border-bottom:1px solid #0f1829;color:#94a3b8}
.att-table td:first-child{color:#e2e8f0;font-weight:600}
.chip{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700}
.chip-ok{background:rgba(34,197,94,0.12);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}

.att-block{background:#0f1829;border:1px solid #1a2540;border-radius:16px;margin-bottom:14px;overflow:hidden}
.att-block-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #0b1120}
.att-block-head h4{font-size:15px;font-weight:700}
.att-block-head span{font-size:12px;color:#475569}

@media print{body>*:not(#print-area){display:none!important}#print-area{display:block!important;background:#fff;color:#000}}
#print-area{display:none}
</style>
</head>
<body>

<!-- ───────── MAIN SCREEN ───────── -->
<div id="screen-main" class="screen active">
  <div class="main-top">
    <div>
      <div class="academy-name">잉글리시아이위드멘토링</div>
      <div class="main-title">✅ <span>출석</span> 체크</div>
    </div>
    <div class="clock-block">
      <div class="clock" id="clock">00:00</div>
      <div class="clock-date" id="clock-date"></div>
    </div>
  </div>
  <div class="classes-header">
    <div class="classes-label">오늘의 수업</div>
    <button class="refresh-btn" onclick="loadToday()" title="새로고침">↻</button>
  </div>
  <div class="classes-grid" id="classes-grid">
    <div class="no-class-msg"><div class="icon">⏳</div><p>불러오는 중...</p></div>
  </div>
  <button class="fab-admin" onclick="openPinModal()" title="관리자">⚙️</button>
</div>

<!-- ───────── CHECKIN SCREEN ───────── -->
<div id="screen-checkin" class="screen">
  <div class="ci-header">
    <button class="back-btn" onclick="goMain()">←</button>
    <div class="ci-header-info">
      <h2 id="ci-class-name">-</h2>
      <p id="ci-class-detail">-</p>
    </div>
    <button class="qr-btn" onclick="startQR()">📷 QR</button>
  </div>
  <div class="ci-stats">
    <div class="stat"><div class="stat-n blue" id="s-total">0</div><div class="stat-l">전체</div></div>
    <div class="stat"><div class="stat-n green" id="s-present">0</div><div class="stat-l">출석</div></div>
    <div class="stat"><div class="stat-n red" id="s-absent">0</div><div class="stat-l">미확인</div></div>
  </div>
  <div class="students-grid" id="students-grid"></div>
</div>

<!-- ───────── QR SCREEN ───────── -->
<div id="screen-qr" class="screen">
  <video id="qr-video" playsinline autoplay muted></video>
  <canvas id="qr-canvas"></canvas>
  <div class="qr-ui">
    <div class="qr-shadow"></div>
    <div class="qr-finder">
      <div class="qr-finder-br"></div>
      <div class="qr-finder-tr"></div>
      <div class="qr-scan-line"></div>
    </div>
    <div class="qr-label">학생 QR 코드를 스캔하세요</div>
  </div>
  <button class="qr-back" onclick="stopQR()">← 돌아가기</button>
</div>

<!-- ───────── SUCCESS SCREEN ───────── -->
<div id="screen-success" class="screen">
  <div class="success-circle">✅</div>
  <div class="success-student" id="success-name">-</div>
  <div class="success-text">출석 완료!</div>
  <div class="success-method" id="success-method"></div>
  <div class="success-bar" id="success-bar"></div>
</div>

<!-- ───────── ADMIN SCREEN ───────── -->
<div id="screen-admin" class="screen">
  <div class="admin-top">
    <h2>⚙️ 관리자 패널</h2>
    <button class="btn btn-ghost" onclick="goMain()">← 나가기</button>
  </div>
  <div class="admin-tabs">
    <button class="a-tab active" onclick="switchTab('classes')">반 관리</button>
    <button class="a-tab" onclick="switchTab('attendance')">출석 현황</button>
    <button class="a-tab" onclick="switchTab('qrcards')">QR 카드</button>
  </div>
  <div class="admin-body" id="admin-body"></div>
</div>

<div class="toast" id="toast"></div>
<div id="modals"></div>
<div id="print-area"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   🔧 FIREBASE 설정 — 아래 값을 실제 Firebase 프로젝트 정보로 교체하세요
   academy_v4와 동일한 프로젝트 사용 권장!
═══════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",

function startClock(){
  function tick(){
    const n = new Date();
    const hh = String(n.getHours()).padStart(2,'0');
    const mm = String(n.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = `${hh}:${mm}`;
    document.getElementById('clock-date').textContent =
      `${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일 (${DAY_KR[n.getDay()]})`;
  }
  tick();
  setInterval(tick, 10000);
}

/* ════════════════════════════════
   HELPERS
════════════════════════════════ */
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function todayDay(){ // 1=Mon...7=Sun
  const d = new Date().getDay();
  return d === 0 ? 7 : d;
}

function classStatus(cls){
  const now = new Date();
  const nowM = now.getHours()*60 + now.getMinutes();
  const [sh,sm] = cls.startTime.split(':').map(Number);
  const [eh,em] = cls.endTime.split(':').map(Number);
  const startM = sh*60+sm, endM = eh*60+em;
  if(nowM >= startM && nowM < endM) return 'now';
  if(nowM < startM && startM - nowM <= 30) return 'soon';
  if(nowM < startM) return 'upcoming';
  return 'past';
}

function fmtTime(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function renderMain(){

async function openCheckin(classId){
  const cls = S.classes.find(c=>c.id===classId);
  if(!cls) return;
  S.selected = cls;
  S.checkins = {};

  document.getElementById('ci-class-name').textContent = cls.name;
  document.getElementById('ci-class-detail').textContent =
    `${cls.startTime} ~ ${cls.endTime}  ·  ${cls.teacherName||''} 선생님`;

  show('checkin');

  const attId = `${todayStr()}_${classId}`;
  if(S.listener){ S.listener(); S.listener=null; }
  S.listener = db.collection('attendance').doc(attId).onSnapshot(snap=>{
    S.checkins = snap.exists ? (snap.data().checkins||{}) : {};
    renderStudents();
  });
}

function renderStudents(){
  const cls = S.selected;
  const students = cls.students||[];
  const present = students.filter(s=>S.checkins[s.id]).length;
  document.getElementById('s-total').textContent   = students.length;
  document.getElementById('s-present').textContent = present;
  document.getElementById('s-absent').textContent  = students.length - present;

  document.getElementById('students-grid').innerHTML = students.map(s=>{
    const chk = S.checkins[s.id];
    return `
      <div class="student-card ${chk?'present':''}" onclick="handleTap('${s.id}','${s.name}')">
        <div class="s-avatar">${chk ? '✓' : s.name.charAt(0)}</div>
        <div class="s-name">${s.name}</div>
        ${chk
          ? `<div class="s-time">✅ ${fmtTime(chk.checkinTime)}</div>`
          : `<div class="s-absent">미확인</div>`}
      </div>`;
  }).join('');
}

async function handleTap(studentId, studentName, method='touch'){
  if(!S.selected) return;
  const cls = S.selected;
  const attId = `${todayStr()}_${cls.id}`;
  const already = !!S.checkins[studentId];

  if(already){
    // 출석 취소
    const updated = {...S.checkins};
    delete updated[studentId];
    await db.collection('attendance').doc(attId).set({
      date:todayStr(), classId:cls.id, className:cls.name,
      teacherName:cls.teacherName||'', subject:cls.subject||'',
      checkins:updated,
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    toast(`${studentName} 출석 취소`);
  } else {
    // 출석 체크
    const entry = {
      name: studentName,
      checkinTime: firebase.firestore.FieldValue.serverTimestamp(),
      method: method
    };
    await db.collection('attendance').doc(attId).set({
      date:todayStr(), classId:cls.id, className:cls.name,
      teacherName:cls.teacherName||'', subject:cls.subject||'',
      checkins:{...S.checkins, [studentId]:entry},
      updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    showSuccess(studentName, method);
  }
}

  document.getElementById('success-method').textContent =

/* ════════════════════════════════
   QR SCAN
════════════════════════════════ */
async function startQR(){
  show('qr');
  const video = document.getElementById('qr-video');
  const canvas = document.getElementById('qr-canvas');
  const ctx = canvas.getContext('2d');

  try{
    S.qrStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    video.srcObject = S.qrStream;
    await video.play();

    function tick(){
      if(S.screen !== 'qr') return;
      if(video.readyState === video.HAVE_ENOUGH_DATA){
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video,0,0);
        const img = ctx.getImageData(0,0,canvas.width,canvas.height);
        const code = jsQR(img.data,img.width,img.height);
        if(code){ handleQR(code.data); return; }
      }
      S.qrFrame = requestAnimationFrame(tick);
    }
    S.qrFrame = requestAnimationFrame(tick);
  }catch(e){
    toast('카메라 권한이 필요합니다');
    show('checkin');
  }
}

function stopQR(){
  if(S.qrStream){ S.qrStream.getTracks().forEach(t=>t.stop()); S.qrStream=null; }
  if(S.qrFrame){ cancelAnimationFrame(S.qrFrame); S.qrFrame=null; }
  const v = document.getElementById('qr-video');
  if(v) v.srcObject=null;
}

function handleQR(data){
  stopQR();
  // QR format: "STUDENT:{id}:{name}"
  if(data.startsWith('STUDENT:')){
    const [,id,name] = data.split(':');
    const student = (S.selected?.students||[]).find(s=>s.id===id);
    if(student){
      show('checkin');
      handleTap(id, student.name, 'qr');
    } else {
      toast('이 수업 학생이 아닙니다');
      show('checkin');
    }
  } else {
    toast('올바른 QR 코드가 아닙니다');
    show('checkin');
  }
}

  el.innerHTML = `

        ${[0,1,2,3].map(i=>`<div class="pin-dot" id="pd-${i}"></div>`).join('')}
      </div>
      <div class="numpad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="np" onclick="pinKey('${n}')">${n}</button>`).join('')}
        <button class="np blank"></button>
        <button class="np" onclick="pinKey('0')">0</button>
        <button class="np del" onclick="pinDel()">⌫</button>
      </div>
      <button onclick="closePinModal()" style="margin-top:18px;background:none;border:none;color:#334155;cursor:pointer;font-family:inherit;font-size:13px">취소</button>
    </div>`;
  document.getElementById('modals').appendChild(el);
}

function pinKey(d){
  if(S.pin.length>=4) return;
  S.pin += d;
  updateDots();
  if(S.pin.length===4){
    setTimeout(()=>{
      if(S.pin === ADMIN_PIN){
        closePinModal();
        openAdmin();
      } else {
        for(let i=0;i<4;i++) document.getElementById(`pd-${i}`)?.classList.add('err');
        setTimeout(()=>{
          S.pin='';
          updateDots(true);
        }, 600);
      }
    },100);
  }
}

function pinDel(){
  S.pin = S.pin.slice(0,-1);
  updateDots();
}

function updateDots(err=false){
  for(let i=0;i<4;i++){
    const d = document.getElementById(`pd-${i}`);
    if(!d) return;
    d.classList.toggle('on', !err && i < S.pin.length);
    d.classList.toggle('err', err && i < 4);
    if(!err) d.classList.remove('err');
  }
}

function closePinModal(){
  document.getElementById('pin-overlay')?.remove();
}

async function saveClass(cid){
  const name    = document.getElementById('m-name').value.trim();
  const subject = document.getElementById('m-sub').value;
  const teacher = document.getElementById('m-teacher').value.trim();
  const start   = document.getElementById('m-start').value;
  const end     = document.getElementById('m-end').value;
  if(!name||!start||!end){ toast('반 이름과 수업 시간은 필수입니다'); return; }
  if(!S.modalDays.length){ toast('수업 요일을 선택해주세요'); return; }

  const data = {
    name, subject, teacherName:teacher,
    startTime:start, endTime:end,
    days:[...S.modalDays].sort(),
    students:S.modalStudents,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  if(cid){
    await db.collection('classes').doc(cid).update(data);
    toast('반 정보가 수정되었습니다');
  } else {
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    await db.collection('classes').add(data);
    toast('새 반이 추가되었습니다');
  }
  closeClsModal();
  const snap = await db.collection('classes').orderBy('startTime').get();
  S.classes = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderAdmin();
}

function closeClsModal(){ document.getElementById('cls-modal')?.remove(); }

async function deleteClass(cid, name){
  if(!confirm(`"${name}" 반을 삭제하시겠습니까?`)) return;
  await db.collection('classes').doc(cid).delete();
  toast('삭제되었습니다');
  const snap = await db.collection('classes').orderBy('startTime').get();
  S.classes = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderAdmin();
}

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
let _tt=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if(_tt) clearTimeout(_tt);
  _tt=setTimeout(()=>el.classList.remove('show'), 2500);
}

════════════════════════════════ */
startClock();
loadToday();
setInterval(loadToday, 300_000); // 5분마다 새로고침
